<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PC Store — Iniciar Sesión</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #070b14;
      --surface: #0d1424;
      --border: #1a2744;
      --accent: #00ff1e;
      --accent2: #7b61ff;
      --text: #cdd6f4;
      --muted: #6c7aa0;
      --danger: #f38ba8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    /* Grid background */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Glow orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      animation: pulse 8s ease-in-out infinite;
    }
    .orb1 { width: 400px; height: 400px; background: rgba(0,229,255,.07); top: -100px; left: -100px; }
    .orb2 { width: 300px; height: 300px; background: rgba(123,97,255,.08); bottom: -80px; right: -80px; animation-delay: 3s; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:.7} 50%{transform:scale(1.1);opacity:1} }

    .login-wrapper {
      width: 440px;
      position: relative;
      animation: fadeUp .5s ease forwards;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    .brand-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 14px;
      margin-bottom: .75rem;
      font-size: 1.6rem;
    }
    .brand h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #fff;
    }
    .brand span { color: var(--accent); }
    .brand p {
      font-size: .8rem;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: .25rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
      position: relative;
      overflow: hidden;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }
    label {
      display: block;
      font-size: .75rem;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .5rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    input {
      width: 100%;
      background: rgba(0,0,0,.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem 1rem;
      color: var(--text);
      font-size: .95rem;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,229,255,.1);
    }
    input::placeholder { color: #2d3b5e; }

    .btn-login {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, var(--accent), #0077ff);
      border: none;
      border-radius: 8px;
      color: #070b14;
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: .5rem;
      transition: opacity .2s, transform .1s;
    }
    .btn-login:hover { opacity: .9; }
    .btn-login:active { transform: scale(.99); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; }

    .error-msg {
      background: rgba(243,139,168,.1);
      border: 1px solid rgba(243,139,168,.3);
      color: var(--danger);
      border-radius: 8px;
      padding: .6rem 1rem;
      font-size: .85rem;
      margin-top: 1rem;
      display: none;
    }

    .demo-accounts {
      margin-top: 1.5rem;
      border-top: 1px solid var(--border);
      padding-top: 1.25rem;
    }
    .demo-accounts p {
      font-size: .72rem;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: .6rem;
      font-family: 'IBM Plex Mono', monospace;
    }
    .demo-btn {
      display: inline-block;
      padding: .3rem .7rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: .78rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--muted);
      cursor: pointer;
      margin-right: .4rem;
      margin-bottom: .4rem;
      transition: all .2s;
      background: none;
    }
    .demo-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>

  <div class="login-wrapper">
    <div class="brand">
      <div class="brand-icon">🖥️</div>
      <h1>PC<span>Store</span></h1>
      <p>Sistema de gestion de componentes para pc</p>
    </div>

    <div class="card">
      <div class="form-group">
        <label>Usuario</label>
        <input id="username" type="text" placeholder="Ingresa tu usuario" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-login" id="btnLogin" onclick="doLogin()">Iniciar Sesión</button>
      <div class="error-msg" id="errMsg"></div>

      <div class="demo-accounts">
        <p>Cuentas</p>
        <button class="demo-btn" onclick="fillDemo('admin','admin123')">admin</button>
        <button class="demo-btn" onclick="fillDemo('vendedor','vendedor123')">vendedor</button>
        <button class="demo-btn" onclick="fillDemo('inventario','inventario123')">inventario</button>
      </div>
    </div>
  </div>

  <script>
    const API = 'http://localhost:3001/api';

    function fillDemo(u, p) {
      document.getElementById('username').value = u;
      document.getElementById('password').value = p;
    }

    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    async function doLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('btnLogin');
      const err = document.getElementById('errMsg');
      err.style.display = 'none';

      if (!username || !password) {
        err.textContent = 'Completa todos los campos';
        err.style.display = 'block';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      try {
        const res = await fetch(`${API}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Error de autenticación');
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));
        window.location.href = 'app.html';
      } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Iniciar Sesión';
      }
    }

    // Redireccion lista para loggin 
    if (localStorage.getItem('token')) window.location.href = 'app.html';
  </script>
</body>
</html>
